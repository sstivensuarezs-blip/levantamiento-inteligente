<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Detector Inteligente Automático de Muros</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; }
        #app-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
        #video-preview { width: 100%; height: 40vh; position: relative; background: #111; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #canvas-preview { width: 100%; height: 60vh; background: #151515; position: relative; }
        canvas { width: 100%; height: 100%; }
        .ui-status { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.85); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid #444; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .dot { width: 10px; height: 10px; background: #dc3545; border-radius: 50%; }
    </style>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" id="opencv-core"></script>
</head>
<body>

    <div id="app-container">
        <div id="video-preview">
            <div class="ui-status">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">Iniciando IA...</span>
            </div>
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <div id="canvas-preview">
            <canvas id="plano2d"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('plano2d');
        const ctx = canvas.getContext('2d');
        
        let src, dst, edges, lines;
        let aiReady = false;
        let murosDetectados = [];

        // Cambiar estado cuando la Inteligencia Artificial esté completamente cargada
        document.getElementById('opencv-core').onload = () => {
            document.getElementById('status-dot').style.backgroundColor = '#28a745';
            document.getElementById('status-text').innerText = 'IA: ESCANEANDO MUROS Y VENTANAS';
            aiReady = true;
            verificarEstructuras();
        };

        async function encenderCamara() {
            try {
                // Forzar uso de cámara trasera y pedir resolución limpia
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                // Fallback si estás probando desde PC con webcam frontal
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            }
        }

        function adaptarLienzo() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        function verificarEstructuras() {
            if (!aiReady || video.readyState !== video.HAVE_ENOUGH_DATA) {
                setTimeout(verificarEstructuras, 100);
                return;
            }

            // Inicializar matrices de memoria de visión por computadora
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            edges = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            lines = new cv.Mat();

            procesarVideoEnVivo();
        }

        function procesarVideoEnVivo() {
            try {
                // 1. Leer el fotograma actual del video
                let cap = new cv.VideoCapture(video);
                cap.read(src);

                // 2. Convertir a escala de grises para eliminar colores, ropa y ruido visual
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);

                // 3. Algoritmo Canny: Filtra solo las líneas estructurales de alto contraste (muros)
                cv.Canny(dst, edges, 50, 150, 3);

                // 4. Transformada de Hough: Identifica automáticamente líneas rectas continuas (muros y ventanas)
                cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 30, 40, 10);

                // Limpiar trazos viejos del plano temporal para actualizar en tiempo real
                murosDetectados = [];

                // 5. Analizar las líneas encontradas de forma inteligente
                for (let i = 0; i < lines.rows; ++i) {
                    let x1 = lines.data32S[i * 4];
                    let y1 = lines.data32S[i * 4 + 1];
                    let x2 = lines.data32S[i * 4 + 2];
                    let y2 = lines.data32S[i * 4 + 3];

                    // Calcular longitud y ángulo de la línea para verificar si es un muro o vano
                    let dx = x2 - x1;
                    let dy = y2 - y1;
                    let longitud = Math.sqrt(dx*dx + dy*dy);

                    // Si la línea es lo suficientemente larga, la app entiende de forma autónoma que es un elemento estructural
                    if (longitud > 35) {
                        // Proyectar coordenadas del video relativo a la pantalla 2D del plano inferior
                        let px1 = (x1 / video.videoWidth) * canvas.width;
                        let py1 = (y1 / video.videoHeight) * canvas.height;
                        let px2 = (x2 / video.videoWidth) * canvas.width;
                        let py2 = (y2 / video.videoHeight) * canvas.height;

                        // Verificar si por intensidad de luz o líneas paralelas continuas califica como ventana
                        let esVentana = (longitud > 40 && longitud < 120 && Math.abs(dy) < 15);

                        murosDetectados.push({ x1: px1, y1: py1, x2: px2, y2: py2, ventana: esVentana });
                    }
                }

                // Dibujar automáticamente el plano arquitectónico puro en 2D abajo
                renderizarPlano2D();

                // Mantener el ciclo de rastreo automático activo (~30 fps)
                requestAnimationFrame(procesarVideoEnVivo);

            } catch (error) {
                // Si la cámara cambia de orientación, reajusta las matrices sin tumbar la app
                setTimeout(verificarEstructuras, 100);
            }
        }

        function renderizarPlano2D() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (murosDetectados.length === 0) {
                ctx.fillStyle = "#666";
                ctx.font = "14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("Mueve el video despacio enfocando los muros...", canvas.width / 2, canvas.height / 2);
                return;
            }

            // Dibujar los elementos que la IA detecta de forma autónoma
            murosDetectados.forEach(muro => {
                ctx.beginPath();
                ctx.moveTo(muro.x1, muro.y1);
                ctx.lineTo(muro.x2, muro.y2);

                if (muro.ventana) {
                    // Símbolo de ventana en 2D puro: Doble línea azul/celeste delgada
                    ctx.strokeStyle = '#00a8ff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Línea paralela interna del vano
                    ctx.beginPath();
                    ctx.moveTo(muro.x1, muro.y1 + 4);
                    ctx.lineTo(muro.x2, muro.y2 + 4);
                    ctx.stroke();
                } else {
                    // Símbolo de muro de carga: Línea blanca sólida y gruesa (corte arquitectónico plano)
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 6;
                    ctx.stroke();
                }
            });
        }

        window.addEventListener('resize', () => {
            adaptarLienzo();
        });

        window.addEventListener('load', () => {
            encenderCamara();
            adaptarLienzo();
        });
    </script>
</body>
</html>
