<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Levantamiento sobre Perímetro Predial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #111; font-family: sans-serif; color: #fff; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        
        /* Buscador superior */
        #search-bar { display: flex; gap: 8px; padding: 10px; background: #222; border-bottom: 1px solid #333; z-index: 100; }
        #address-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 14px; }
        #btn-search { background: #28a745; border: none; color: white; padding: 10px 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        /* Contenedor del Mapa Interactiva */
        #map { width: 100%; height: 50vh; background: #151515; position: relative; }
        
        /* Panel de Control de Dibujo CAD Inferior */
        #cad-panel { width: 100%; height: 50vh; background: #181818; border-top: 2px solid #444; position: relative; display: flex; flex-direction: column; }
        #status-bar { background: #222; padding: 8px 16px; font-size: 12px; border-bottom: 1px solid #333; color: #aaa; }
        
        #canvas-container { flex: 1; position: relative; background: #111; }
        canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* Botonera de herramientas */
        .tools-container { padding: 10px; display: flex; gap: 8px; justify-content: center; background: #1f1f1f; z-index: 10; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 18px; font-size: 13px; font-weight: bold; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .tool-btn.active { background: #007bff; border-color: #00a8ff; }
        #btn-clear { background: #dc3545; border-color: #bd2130; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="search-bar">
            <input type="text" id="address-input" placeholder="Escribe la dirección (Ej: Calle 50, Bello, Colombia)...">
            <button id="btn-search">📍 Buscar</button>
        </div>

        <div id="map"></div>

        <div id="cad-panel">
            <div id="status-bar">🎯 Estado: Busca una dirección o toca el mapa para capturar el lote base.</div>
            <div id="canvas-container">
                <canvas id="cadCanvas"></canvas>
            </div>
            <div class="tools-container">
                <button id="tool-muro" class="tool-btn active">🧱 Muro Interno</button>
                <button id="tool-ventana" class="tool-btn">🪟 Ventana</button>
                <button id="btn-clear" class="tool-btn">🧹 Limpiar Dibujo</button>
            </div>
        </div>
    </div>

    <script>
        const addressInput = document.getElementById('address-input');
        const btnSearch = document.getElementById('btn-search');
        const statusBar = document.getElementById('status-bar');
        const canvas = document.getElementById('cadCanvas');
        const ctx = canvas.getContext('2d');
        
        let map;
        let selectedMarker = null;
        let currentTool = 'muro'; // 'muro' o 'ventana'
        
        // Base de datos del levantamiento actual
        let lotePerimetro = []; // Polígono del predio (esquinas capturadas del mapa)
        let dibujoInterno = { muros: [], ventanas: [] };

        // 1. INICIALIZAR EL MAPA (Centrado por defecto en Bello, Antioquia)
        function inicializarMapa() {
            map = L.map('map', {
                center: [6.3373, -75.5579], 
                zoom: 16,
                zoomControl: false
            });

            // Capa de mapa híbrida/satelital limpia (OpenStreetMap estándar)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // Capturar coordenadas tocando directamente sobre el mapa
            map.on('click', function(e) {
                establecerPuntoPredio(e.latlng.lat, e.latlng.lng);
            });
        }

        // 2. MOTOR DE BÚSQUEDA DE DIRECCIÓN (Geocodificación Gratuita)
        async function buscarDireccion() {
            const query = addressInput.value;
            if (!query) return;

            statusBar.innerText = "Buscando coordenadas del predio...";
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const datos = await response.json();

                if (datos && datos.length > 0) {
                    const resultado = datos[0];
                    const lat = parseFloat(resultado.lat);
                    const lon = parseFloat(resultado.lon);

                    // Mover mapa al lote encontrado
                    map.setView([lat, lon], 19);
                    establecerPuntoPredio(lat, lon);
                    
                    // Si la API provee el polígono del contorno (bounding box o geojson), lo estimamos como base irregular
                    if(resultado.boundingbox) {
                        generarPerimetroBase(lat, lon);
                    }
                } else {
                    statusBar.innerText = "❌ No se encontró la dirección. Intenta marcar tocando el mapa.";
                }
            } catch (error) {
                statusBar.innerText = "Error de conexión con el servidor geográfico.";
            }
        }

        function establecerPuntoPredio(lat, lon) {
            if (selectedMarker) map.removeLayer(selectedMarker);
            
            selectedMarker = L.marker([lat, lon]).addTo(map);
            statusBar.innerText = `📍 Ubicado en: ${lat.toFixed(5)}, ${lon.toFixed(5)}. Generando perímetro base...`;
            
            generarPerimetroBase(lat, lon);
        }

        // 3. INTELIGENCIA: Transforma coordenadas del globo terráqueo a un polígono CAD 2D simétrico
        function generarPerimetroBase(lat, lon) {
            // Simulamos un polígono irregular base de 4 linderos alrededor del punto catastral
            // En versiones posteriores, aquí inyectaremos la respuesta WFS exacta de Catastro.
            lotePerimetro = [
                { x: canvas.width * 0.25, y: canvas.height * 0.25 }, // Esquina Superior Izquierda
                { x: canvas.width * 0.75, y: canvas.height * 0.20 }, // Esquina Superior Derecha (Irregular)
                { x: canvas.width * 0.80, y: canvas.height * 0.80 }, // Esquina Inferior Derecha
                { x: canvas.width * 0.20, y: canvas.height * 0.75 }  // Esquina Inferior Izquierda
            ];

            dibujarLienzoCAD();
        }

        // 4. MOTOR DIBUJO CAD INTERACTIVO (Con escala amplia incorporada)
        function dibujarLienzoCAD() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Rejilla de ingeniería sutil de fondo
            ctx.strokeStyle = '#1e1e1e';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=25) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=25) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            if (lotePerimetro.length === 0) {
                ctx.fillStyle = '#555';
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText("El perímetro del lote aparecerá aquí automáticamente", canvas.width / 2, canvas.height / 2);
                return;
            }

            // DIBUJAR PERÍMETRO DEL LOTE REGULAR/IRREGULAR (Línea naranja de lindero bloqueada)
            ctx.beginPath();
            ctx.strokeStyle = '#ff9f43';
            ctx.lineWidth = 3;
            ctx.setLineDash([6, 4]); // Línea punteada de linde catastral
            ctx.moveTo(lotePerimetro[0].x, lotePerimetro[0].y);
            for(let i=1; i<lotePerimetro.length; i++) {
                ctx.lineTo(lotePerimetro[i].x, lotePerimetro[i].y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]); // Restablecer línea sólida para muros

            // DIBUJAR MUROS INTERNOS LEVANTADOS (Líneas blancas gruesas en corte)
            if (dibujoInterno.muros.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(dibujoInterno.muros[0].x, dibujoInterno.muros[0].y);
                for(let i=1; i<dibujoInterno.muros.length; i++) {
                    ctx.lineTo(dibujoInterno.muros[i].x, dibujoInterno.muros[i].y);
                }
                ctx.stroke();
            }

            // DIBUJAR VENTANAS INTERNAS (Doble línea celeste técnica)
            if (dibujoInterno.ventanas.length > 1) {
                ctx.strokeStyle = '#00a8ff';
                ctx.lineWidth = 2;
                for (let i = 0; i < dibujoInterno.ventanas.length; i += 2) {
                    if (!dibujoInterno.ventanas[i+1]) break;
                    let p1 = dibujoInterno.ventanas[i];
                    let p2 = dibujoInterno.ventanas[i+1];
                    
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y + 4); ctx.lineTo(p2.x, p2.y + 4); ctx.stroke();
                }
            }
        }

        // 5. CAPTURA DE TRAZOS TÁCTILES CON DEDO / LÁPIZ ÓPTICO
        canvas.addEventListener('click', (e) => {
            if (lotePerimetro.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            let clickY = e.clientY - rect.top;

            // REGLA DE ADHERENCIA MAGNETICA (Snapping): Si el toque es cerca de un lindero, se pega exacto
            lotePerimetro.forEach(vertice => {
                let dx = clickX - vertice.x;
                let dy = clickY - vertice.y;
                let distancia = Math.sqrt(dx*dx + dy*dy);
                if (distancia < 18) { // Radio de atracción en píxeles
                    clickX = vertice.x;
                    clickY = vertice.y;
                    statusBar.innerText = "🧲 Muro acoplado magnéticamente al lindero real del lote.";
                }
            });

            // Guardar trazo según la herramienta activa
            if (currentTool === 'muro') {
                dibujoInterno.muros.push({ x: clickX, y: clickY });
            } else {
                dibujoInterno.ventanas.push({ x: clickX, y: clickY });
            }

            dibujarLienzoCAD();
        });

        // Manejo de botones de interfaz
        document.getElementById('tool-muro').addEventListener('click', function() {
            currentTool = 'muro'; restaurarBotones(); this.className = 'tool-btn active';
        });
        document.getElementById('tool-ventana').addEventListener('click', function() {
            currentTool = 'ventana'; restaurarBotones(); this.className = 'tool-btn active';
        });
        
        function restaurarBotones() {
            document.getElementById('tool-muro').className = 'tool-btn';
            document.getElementById('tool-ventana').className = 'tool-btn';
        }

        document.getElementById('btn-clear').addEventListener('click', () => {
            dibujoInterno = { muros: [], ventanas: [] };
            statusBar.innerText = "Trazos internos eliminados. Plantilla perimetral preservada.";
            dibujarLienzoCAD();
        });

        function adaptarElementos() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            dibujarLienzoCAD();
        }

        btnSearch.addEventListener('click', buscarDireccion);
        addressInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') buscarDireccion(); });

        window.addEventListener('resize', adaptarElementos);
        window.addEventListener('load', () => {
            inicializarMapa();
            adaptarElementos();
        });
    </script>
</body>
</html>
