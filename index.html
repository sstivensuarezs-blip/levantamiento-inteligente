<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Levantamiento Automático por Movimiento</title>
    <style>
        body { margin: 0; padding: 0; background: #111; font-family: sans-serif; color: #fff; overflow: hidden; }
        #app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        #camera-area { width: 100%; height: 40vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        #canvas-area { width: 100%; height: 60vh; background: #1a1a1a; position: relative; border-top: 2px solid #333; }
        canvas { width: 100%; height: 100%; }
        .status-bar { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px; font-size: 12px; border: 1px solid #444; z-index: 10; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; }
        #btn-win { background: #00a8ff; }
        #btn-clear { background: #dc3545; }
    </style>
</head>
<body>

    <div id="app">
        <div id="camera-area">
            <div class="status-bar">🎯 Modo: Rastreo de Muros Activo</div>
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        <div id="canvas-area">
            <canvas id="plano"></canvas>
            <div class="controls">
                <button id="btn-win">Marcar Ventana aquí</button>
                <button id="btn-clear">Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('plano');
        const ctx = canvas.getContext('2d');
        
        let puntos = [];
        let xActual, yActual;

        async function iniciarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } }, audio: false
                });
                video.srcObject = stream;
            } catch (e) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            }
        }

        function ajustarLienzo() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            xActual = canvas.width / 2;
            yActual = canvas.height * 0.7; // Empezar abajo al centro
            puntos = [{ x: xActual, y: yActual, tipo: 'muro' }];
            dibujarPlano();
        }

        // INTELIGENCIA POR SENSOR: Detecta el giro físico del teléfono en el espacio
        window.addEventListener('deviceorientation', (event) => {
            if (event.alpha === null) return; // Si no hay sensor disponible

            // Usamos el giro horizontal (alpha) para calcular la dirección del muro
            let alfaRad = (event.alpha * Math.PI) / 180;
            
            // Distancia de avance simulada por el tiempo de grabación
            let velocidad = 0.4; 
            
            xActual += Math.sin(alfaRad) * velocidad;
            yActual -= Math.cos(alfaRad) * velocidad;

            // Restringir que no se salga de la pantalla
            xActual = Math.max(10, Math.min(canvas.width - 10, xActual));
            yActual = Math.max(10, Math.min(canvas.height - 10, yActual));

            // Para evitar saturar, agregamos un punto estructural cada pocos cuadros
            if (Math.random() < 0.15) {
                puntos.push({ x: xActual, y: yActual, tipo: 'muro' });
            }
            dibujarPlano();
        });

        function dibujarPlano() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (puntos.length < 2) return;

            // Dibujar la distribución de muros cortados en 2D puro
            for (let i = 1; i < puntos.length; i++) {
                ctx.beginPath();
                ctx.moveTo(puntos[i-1].x, puntos[i-1].y);
                ctx.lineTo(puntos[i].x, puntos[i].y);

                if (puntos[i].tipo === 'ventana') {
                    // Representación técnica 2D de ventana (Línea doble celeste)
                    ctx.strokeStyle = '#00a8ff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else {
                    // Representación técnica 2D de muro grueso (Línea blanca sólida)
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 6;
                    ctx.stroke();
                }
            }
        }

        document.getElementById('btn-win').addEventListener('click', () => {
            puntos.push({ x: xActual, y: yActual, tipo: 'ventana' });
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            ajustarLienzo();
        });

        window.addEventListener('resize', ajustarLienzo);
        window.addEventListener('load', () => {
            iniciarCamara();
            ajustarLienzo();
        });
    </script>
</body>
</html>
